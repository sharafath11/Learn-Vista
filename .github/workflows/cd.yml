name: CD

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

env:
  REGISTRY: docker.io
  SERVER_IMAGE: ${{ vars.SERVER_IMAGE_NAME || 'sharafathst/learnvista-server' }}
  CLIENT_IMAGE: ${{ vars.CLIENT_IMAGE_NAME || 'sharafathst/learnvista-client' }}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-push:
    name: Build And Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Server Metadata
        id: server_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build And Push Server Image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.server_meta.outputs.tags }}
          labels: ${{ steps.server_meta.outputs.labels }}

      - name: Extract Client Metadata
        id: client_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CLIENT_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build And Push Client Image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_BASEURL=${{ vars.CLIENT_NEXT_PUBLIC_BASEURL || 'https://api.learnvista.sharafathabi.cloud' }}
          tags: ${{ steps.client_meta.outputs.tags }}
          labels: ${{ steps.client_meta.outputs.labels }}

  deploy:
    name: Deploy On Server
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: ${{ vars.ENABLE_REMOTE_DEPLOY == 'true' }}
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
